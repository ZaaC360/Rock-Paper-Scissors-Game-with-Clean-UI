<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>\
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <header id="head">
            <h1 id = h1>Rock-Paper-Scissors Game!</h1>
        </header>
            
        <div id="game">
            <div class="choices">
                <button id="rock" class="btn">
                    <img src="imgs/rock.png" alt="Rock">
                </button>
                <button id="paper" class="btn">
                    <img src="imgs/paper.png" alt="Paper">
                </button>
                <button id="scissors" class="btn">
                    <img src="imgs/scissors.png" alt="Scissors">
                </button>
            </div>
            <div class="score-board">
      <div class="score">
        <p id="user-score">User: 0</p>
       
      </div>
      <div class="score">
        <p id="comp-score">Computer: 0</p>
        
      </div>
    </div>
            <div id="result">
                <p id="result-text">You won!</p>
            </div>
        </div>    
     
<script src="script.js"></script>   
</body>
</html>
